<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Good Established Meme ($GEM)</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --gem:#00FFB2;
    --gem-dark:#00CC8F;
    --rug:#FF3B5C;
    --gold:#FFD700;
    --bg:#0A0E1A;
    --surface:#111827;
    --surface2:#1A2235;
    --border:#2A3550;
    --text:#E8F0FF;
    --muted:#6B7FA8;
    --overlay:rgba(10,14,26,.92);
  }

  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; min-height:100%; }
  body {
    background:
      radial-gradient(circle at top, rgba(0,255,178,.09), transparent 35%),
      radial-gradient(circle at bottom right, rgba(255,215,0,.07), transparent 30%),
      var(--bg);
    color:var(--text);
    font-family:'Space Mono', monospace;
    overflow-x:hidden;
    user-select:none;
  }

  .app {
    width:100%;
    max-width:1200px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  .header {
    position:sticky;
    top:0;
    z-index:30;
    width:100%;
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    border-bottom:1px solid var(--border);
    background:rgba(17,24,39,.94);
    backdrop-filter:blur(10px);
  }

  .brand {
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
  }

  .logo {
    width:44px;
    height:44px;
    border-radius:12px;
    border:1px solid var(--border);
    background:linear-gradient(145deg, var(--surface2), #0f172a);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Bebas Neue', sans-serif;
    color:var(--gem);
    letter-spacing:1px;
    font-size:20px;
    box-shadow:0 0 24px rgba(0,255,178,.08);
    flex-shrink:0;
  }

  .brand-copy { min-width:0; }
  .title {
    font-family:'Bebas Neue', sans-serif;
    font-size:26px;
    letter-spacing:2px;
    line-height:1;
    color:var(--gem);
    white-space:nowrap;
  }
  .title span { color:var(--gold); }
  .sub {
    font-size:10px;
    color:var(--muted);
    margin-top:4px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .pill {
    border:1px solid rgba(0,255,178,.22);
    color:var(--gem);
    background:rgba(0,255,178,.06);
    padding:8px 10px;
    border-radius:999px;
    font-size:10px;
    white-space:nowrap;
    flex-shrink:0;
  }

  .ticker {
    border-bottom:1px solid rgba(0,255,178,.15);
    background:rgba(0,255,178,.05);
    overflow:hidden;
    height:26px;
    display:flex;
    align-items:center;
  }
  .ticker-inner {
    white-space:nowrap;
    display:flex;
    gap:34px;
    padding:0 18px;
    animation:scroll 20s linear infinite;
    font-size:10px;
    color:var(--gem);
  }
  @keyframes scroll {
    from { transform:translateX(0); }
    to { transform:translateX(-50%); }
  }

  .hero {
    padding:18px 16px 10px;
    display:grid;
    gap:14px;
  }

  .hero-card,
  .section,
  .board-frame
